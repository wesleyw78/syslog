services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-syslog}
      MYSQL_USER: ${MYSQL_USER:-syslog}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-syslog}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  backend:
    image: golang:1.22
    working_dir: /workspace/backend
    command: >
      sh -lc "go mod download && go run ./cmd/server"
    volumes:
      - ./:/workspace
    depends_on:
      - mysql
    ports:
      - "8080:8080"
      - "5514:1514/udp"

  frontend:
    image: node:22
    working_dir: /workspace/frontend
    command: >
      sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./:/workspace
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  mysql-data:
