services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-syslog}
      MYSQL_USER: ${MYSQL_USER:-syslog}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-syslog}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    image: golang:1.22
    working_dir: /workspace/backend
    environment:
      MYSQL_HOST: mysql
    command: >
      sh -lc "/usr/local/go/bin/go mod download && /usr/local/go/bin/go run ./cmd/server"
    volumes:
      - ./:/workspace
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
      - "514:1514/udp"

  frontend:
    image: node:22
    working_dir: /workspace/frontend
    environment:
      VITE_API_PROXY_TARGET: http://backend:8080
    command: >
      sh -lc "npm install && npm install --no-save @rollup/rollup-linux-x64-gnu && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./:/workspace
      - frontend-node_modules:/workspace/frontend/node_modules
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  mysql-data:
  frontend-node_modules:
